repos:
  - repo: local
    hooks:
      - id: cargo-test
        name: cargo test --locked
        entry: cargo test --locked
        language: system
        pass_filenames: false
        types: [rust]

      - id: codegen-check
        name: codegen dry-run diff check
        entry: bash -c 'cargo run -p xtask -- gen --max 8 && git diff --exit-code -- src/gen_tuple.rs'
        language: system
        pass_filenames: false
        types: [rust]
